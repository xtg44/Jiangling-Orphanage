<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>个人文件夹 · 密码验证</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #e8e4dc;
            font-family: "宋体", "SimSun", "Times New Roman", serif;
            padding: 20px 16px 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #222;
        }

        .password-wrapper {
            max-width: 500px;
            width: 100%;
            background: #f5f0e8;
            border: 2px solid #b0a898;
            padding: 32px 36px 28px;
            text-align: center;
        }

        .password-wrapper .icon {
            font-size: 48px;
            margin-bottom: 8px;
        }

        .password-wrapper h1 {
            font-size: 22px;
            font-weight: bold;
            color: #2a1a1a;
            letter-spacing: 2px;
            margin-bottom: 4px;
        }

        .password-wrapper .sub {
            font-size: 13px;
            color: #8a7a6a;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .password-wrapper .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        .password-wrapper .input-group input {
            width: 100%;
            max-width: 240px;
            padding: 10px 14px;
            font-size: 20px;
            font-family: "宋体", "SimSun", serif;
            text-align: center;
            letter-spacing: 6px;
            border: 2px solid #b0a898;
            background: #fcf8f0;
            color: #2a1a1a;
            outline: none;
        }

        .password-wrapper .input-group input:focus {
            border-color: #6a5a4a;
        }

        .password-wrapper .input-group button {
            padding: 8px 40px;
            font-size: 15px;
            font-family: "宋体", "SimSun", serif;
            background: #b0a898;
            border: 2px solid #b0a898;
            color: #f5f0e8;
            cursor: pointer;
            transition: background 0.2s;
            letter-spacing: 2px;
        }

        .password-wrapper .input-group button:hover {
            background: #8a7a6a;
        }

        .password-wrapper .error-msg {
            margin-top: 12px;
            font-size: 14px;
            color: #b83030;
            min-height: 24px;
        }

        .password-wrapper .back-link {
            display: block;
            margin-top: 20px;
            padding-top: 14px;
            border-top: 1px solid #d8d0c8;
            font-size: 13px;
            color: #8a7a6a;
        }

        .password-wrapper .back-link a {
            color: #4a3d30;
            text-decoration: none;
            border-bottom: 1px solid transparent;
        }

        .password-wrapper .back-link a:hover {
            border-bottom-color: #4a3d30;
        }

        @media (max-width: 640px) {
            .password-wrapper {
                padding: 24px 20px 20px;
            }
            .password-wrapper h1 {
                font-size: 19px;
            }
            .password-wrapper .input-group input {
                font-size: 18px;
                max-width: 200px;
            }
        }
    </style>
</head>
<body>

    <div class="password-wrapper">

        <div class="icon">🔒</div>
        <h1>个人文件夹</h1>
        <div class="sub">周怀义 · 江陵县福利院</div>

        <div class="input-group">
            <input type="password" id="pwdInput" maxlength="10" placeholder="— — — —" />
            <button onclick="checkPassword()">确认</button>
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <div class="back-link">
            <a href="archive.html">← 返回档案馆</a>
        </div>

    </div>

    <script>
        function checkPassword() {
            var input = document.getElementById('pwdInput');
            var error = document.getElementById('errorMsg');
            var val = input.value.trim();

            if (val === '0314') {
                error.textContent = '';
                window.location.href = 'zhou_folder.html';
            } else if (val === '') {
                error.textContent = '⚠️ 请输入密码';
            } else {
                error.textContent = '❌ 密码错误，请重试';
                input.value = '';
                input.focus();
                setTimeout(function() {
                    error.textContent = '';
                }, 2000);
            }
        }

        document.getElementById('pwdInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') checkPassword();
        });

        // 自动聚焦
        window.addEventListener('load', function() {
            document.getElementById('pwdInput').focus();
        });
    </script>

</body>
</html>
