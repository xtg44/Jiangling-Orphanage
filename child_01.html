<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>编号02 · 儿童档案</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #e8e4dc;
            font-family: "宋体", "SimSun", "Times New Roman", serif;
            padding: 20px 16px 40px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            color: #222;
        }
        .wrapper {
            max-width: 700px;
            width: 100%;
            background: #f5f0e8;
            border: 2px solid #b0a898;
            padding: 24px 28px 20px;
            position: relative;
        }

        /* ===== 篡改警告 ===== */
        .tamper-banner {
            background: #1a0a0a;
            color: #cc6666;
            text-align: center;
            padding: 6px 12px;
            font-size: 13px;
            font-family: "Courier New", "宋体", monospace;
            border-bottom: 2px solid #cc3333;
            margin: -24px -28px 18px -28px;
            letter-spacing: 1px;
        }
        .tamper-banner .time {
            color: #ff8888;
        }

        .header {
            border-bottom: 3px double #b0a898;
            padding-bottom: 12px;
            margin-bottom: 18px;
        }
        .header .title {
            font-size: 20px;
            font-weight: bold;
            color: #2a1a1a;
            letter-spacing: 2px;
        }
        .header .sub {
            font-size: 12px;
            color: #8a7a6a;
            letter-spacing: 1px;
            margin-top: 2px;
        }
        .card {
            border: 1px solid #b0a898;
            background: #fcf8f0;
            margin-bottom: 14px;
        }
        .card .card-header {
            background: #e8e0d6;
            padding: 8px 14px;
            border-bottom: 1px solid #b0a898;
            font-weight: bold;
            font-size: 14px;
            color: #2a1a1a;
        }
        .card .card-body {
            padding: 14px 18px;
            font-size: 14px;
            line-height: 2.2;
            color: #2a1a1a;
        }
        .card .card-body .field {
            display: flex;
            gap: 12px;
            padding: 2px 0;
        }
        .card .card-body .field .label {
            font-weight: bold;
            min-width: 80px;
            color: #4a3d30;
        }
        .card .card-body .field .value {
            color: #2a1a1a;
        }
        .card .card-body .field .value .unknown {
            color: #8a7a6a;
            font-style: italic;
        }
        .card .card-body .field .value .struck {
            text-decoration: line-through;
            color: #8a7a6a;
        }
        .card .card-body .field .value .beautiful {
            color: #b83030;
            font-weight: bold;
        }
        .note-block {
            background: #fcf8f0;
            border: 1px solid #b0a898;
            padding: 12px 16px;
            margin-top: 12px;
            font-size: 13px;
            color: #4a3d30;
            line-height: 2;
        }
        .note-block .highlight {
            color: #b83030;
        }
        .footer {
            margin-top: 18px;
            padding-top: 12px;
            border-top: 2px solid #b0a898;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            font-size: 12px;
            color: #8a7a6a;
        }
        .footer a {
            color: #4a3d30;
            text-decoration: none;
            border-bottom: 1px solid transparent;
        }
        .footer a:hover {
            border-bottom-color: #4a3d30;
        }
        @media (max-width: 640px) {
            .wrapper {
                padding: 14px 14px 16px;
            }
            .tamper-banner {
                margin: -14px -14px 14px -14px;
                font-size: 11px;
                padding: 4px 10px;
            }
            .header .title {
                font-size: 17px;
            }
            .card .card-body {
                font-size: 13px;
                padding: 10px 12px;
            }
            .card .card-body .field {
                flex-direction: column;
                gap: 0;
            }
            .card .card-body .field .label {
                min-width: auto;
            }
        }
    </style>
</head>
<body>

    <div class="wrapper">

        <!-- ===== 篡改警告 ===== -->
        <div class="tamper-banner">
            ⚠️ 该页面在 <span class="time" id="tamperTime">--:--</span> 被未知用户修改
        </div>

        <div class="header">
            <div class="title">📋 儿童档案 · 编号02</div>
            <div class="sub">江陵县福利院 · 1990年登记</div>
        </div>

        <div class="card">
            <div class="card-header">👤 基本信息</div>
            <div class="card-body">
                <div class="field">
                    <span class="label">姓名：</span>
                    <span class="value"><span class="unknown">unknown</span></span>
                </div>
                <div class="field">
                    <span class="label">性别：</span>
                    <span class="value"><span class="unknown">unknown</span></span>
                </div>
                <div class="field">
                    <span class="label">出生年份：</span>
                    <span class="value">1986年</span>
                </div>
                <div class="field">
                    <span class="label">入福利院时间：</span>
                    <span class="value">1986年</span>
                </div>
                <div class="field">
                    <span class="label">档案编号：</span>
                    <span class="value">FLY-1986-002</span>
                </div>
                <div class="field">
                    <span class="label">安置时间：</span>
                    <span class="value">1995年</span>
                </div>
                <div class="field">
                    <span class="label">安置去向：</span>
                    <span class="value">
                        <span class="struck">暂无</span>
                        <span class="beautiful"> 美丽的世界</span>
                    </span>
                </div>
            </div>
        </div>

        <div class="note-block">
            <strong>📌 备注</strong><br />
            该儿童入福利院时出生仅数周，无任何身份记录。<br />
            1995年安置名单中，该儿童被标注为“<span class="highlight">已安置</span>”，但无具体去向。<br />
            1996年民政局核查时发现，该儿童的安置档案 <span class="highlight">缺失</span>。<br />
            其姓名在所有后续记录中均被删除。
            <div style="margin-top:6px; font-size:12px; color:#8a7a6a; text-align:right;">
                —— 档案状态：信息不完整
            </div>
        </div>

        <div class="footer">
            <a href="archive.html">← 返回档案馆</a>
            <a href="child_02.html">下一个档案 →</a>
        </div>

    </div>

    <script>
        // 更新时间：当前时间前1分钟
        (function() {
            var now = new Date();
            now.setMinutes(now.getMinutes() - 1);
            var hours = String(now.getHours()).padStart(2, '0');
            var mins = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('tamperTime').textContent = hours + ':' + mins;
        })();
    </script>

</body>
</html>
